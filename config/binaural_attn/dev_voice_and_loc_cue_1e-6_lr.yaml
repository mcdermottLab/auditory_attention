corpus:
  name: 'spatialized_commonvoice_gise_scenes'
  cue_type: "voice_and_location"
  task: "word"
  root: '/om/scratch/Fri/imgriff/datasets/spatial_audio_pipeline/assets/dataset_binaural_attn/v02'
  with_cue_free: False


audio:                                  # Attributes of audio feature
  rep_type:  'cochlea_filt'
  rep_kwargs:
    sr: 50000
    env_sr: 10000
    n_channels: 40
    low_lim: 40
    use_pad: True
    binaural: True
    rep_on_gpu: True
    center_crop: True
    out_dur: 2  ## in seconds
    impulse_len: 0.25
    env_extraction_type: 'Half-wave Rectification'
    downsampling_type: 'TorchTransformsResample'
    downsampling_kwargs:
      lowpass_filter_width: 64
      rolloff: 0.9475937167399596
      resampling_method: "kaiser_window"
      beta: 14.769656459379492
  compression_type: 'coch_p3'
  compression_kwargs:
    scale: 1
    offset: 0.0000001   
    clip_value: 5
    power: 0.3


val_metric: 'ACC/val_acc'
model_name: 'binaural_attn_cue_voice_and_loc'

noise_kwargs: # parameters for background signal levels 
  low_snr: -10
  high_snr: 10

model:
  num_classes:                         # 998 words in cv vocab
    num_words: 800
    # num_locs: 504
  fc_size: 512
  global_avg_cue: False
  attn_constraints:
    slope: True


hparas:                                   # Experiment hyper-parameters
  valid_step: 250
  epochs: 1000
  optimizer: 'Adam'
  lr: 0.000001
  eps: 0.00000001                         # 1e-8
  gradient_clip_val: 100 
  batch_size: 768                        # Gets divided by num gpus

  