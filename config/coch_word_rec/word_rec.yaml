rep_on_gpu: True

data:
  num_words: 794                       # quarter semitone bins over 4 octaves [-2 : +2]
  corpus:
    root: '/om4/group/mcdermott/projects/ibmHearingAid/assets/data/datasets/JSIN_v3.00/nStim_20000/2000ms/rms_0.1/noiseSNR_-10_10/stimSR_20000/reverb_none/noise_all/JSIN_all_v3/subsets' # Path to raw GigaSpeech dataset
  audio:                                  # Attributes of audio feature
    rep_type:  'cochlea_filt'
    rep_kwargs:
      sr: 16000
      env_sr: 8000
      use_pad: True
      coch_filter_path: '/om4/group/mcdermott/user/imgriff/projects/cocktail_party/deepspeech/cochlear_filter_impulse_response_40_channels_16k_taps_10ms_hann_win.mat'
      coch_filter_kwargs:
        n_channels: 40
        low_lim: 40
        high_lim: 8000
      env_extraction_type: 'Half-wave Rectification'
      downsampling_type: 'SincWithKaiserWindow'
      downsampling_kwargs:
        window_size: 1001
        
    compression_type: 'coch_p3'
    compression_kwargs:
      scale: 1
      offset: 0.0000001   
      clip_value: 5
      power: 0.3
  loader:
    batch_size: 1
    num_workers: 20

hparas:                                   # Experiment hyper-parameters
  valid_step: 60
  epochs: 6
  optimizer: 'Adam'
  lr: 0.01
  eps: 0.00000001                         # 1e-8
  lr_scheduler: 'fixed'                   # 'fixed'/'warmup'
  curriculum: 0
  
  
model:                                    # Model architecture
  cnn_dim: [32, 64, 128, 256, 512, 512, 512]                       
  kernel:  [[2, 34], [2, 14], [5, 5], [5, 5], [6, 6], [5, 5], [6, 6]]
  stride: [1,1,1,1,1,1,1]
  padding: ['same','same','same','same','same','same','same'] # same padding for all
  pool_stride: [[2, 4], [2, 4], [1, 4], [1, 4], [1, 1], [1, 1], [2, 4]] 
  pool_size: [[9, 13], [9, 13], [1, 13], [1, 13], [1, 1], [1, 1], [6, 13]]

